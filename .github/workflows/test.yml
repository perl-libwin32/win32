name: test

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  strawberry:
    name: Strawberry ${{ matrix.perl-version }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        perl-version: ["5.32", "5.36", "5.38", "5.40"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: shogo82148/actions-setup-perl@9f8c263975569ff3b4e510cb1f8813115749e146 # v1.41.0
        with:
          perl-version: ${{ matrix.perl-version }}
          distribution: strawberry
      - run: perl -V
      - run: cpanm --installdeps --notest .
      - run: cpanm --test-only --verbose .

  strawberry-32bit:
    name: Strawberry 5.38.2.1 (32-bit)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install 32-bit Strawberry Perl
        shell: pwsh
        run: |
          $url = 'https://github.com/StrawberryPerl/Perl-Dist-Strawberry/releases/download/SP_5382_32bit/strawberry-perl-5.38.2.1-32bit-portable.zip'
          $zip = "$env:RUNNER_TEMP\strawberry32.zip"
          Invoke-WebRequest -Uri $url -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath C:\strawberry32
          Add-Content -Path $env:GITHUB_PATH -Value 'C:\strawberry32\perl\site\bin'
          Add-Content -Path $env:GITHUB_PATH -Value 'C:\strawberry32\perl\bin'
          Add-Content -Path $env:GITHUB_PATH -Value 'C:\strawberry32\c\bin'
      - run: perl -V
      - run: cpanm --installdeps --notest .
      - run: cpanm --test-only --verbose .

  cygwin:
    name: Cygwin (${{ matrix.cc }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        cc: [gcc, g++]
    defaults:
      run:
        shell: C:\cygwin\bin\bash.exe --login --norc -eo pipefail -o igncr '{0}'
    steps:
      - name: Preserve LF line endings on checkout
        shell: pwsh
        run: git config --global core.autocrlf input
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: cygwin/cygwin-install-action@711d29f3da23c9f4a1798e369a6f01198c13b11a # v6.1
        with:
          packages: >-
            perl
            perl-ExtUtils-MakeMaker
            make
            gcc-core
            gcc-g++
            libcrypt-devel
            curl
      - name: Build and test
        run: |
          cd "$(cygpath --unix "$GITHUB_WORKSPACE")"
          perl -V
          curl --fail --silent --location https://cpanmin.us --output /tmp/cpanm
          perl /tmp/cpanm --notest App::cpanminus
          cpanm --installdeps --notest .
          if [ "${{ matrix.cc }}" = "g++" ]; then
            cpanm --test-only --verbose --configure-args "CC=g++" .
          else
            cpanm --test-only --verbose .
          fi
